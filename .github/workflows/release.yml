name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.version }}"/' \
            custom_components/pool_lab/manifest.json

      - name: Verify manifest
        run: cat custom_components/pool_lab/manifest.json

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$GITHUB_REF_NAME" | head -1)
          if [ -z "$PREV_TAG" ]; then
            # First release - show all commits
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          # Write to file for the release body
          echo "$LOG" > release_notes.md
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}" >> release_notes.md

      - name: Create release zip
        run: |
          cd custom_components/pool_lab
          zip -r ../../pool_lab.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          files: pool_lab.zip
